<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>You're in · MJØÅR</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="/assets/favicon-32.png" sizes="32x32" type="image/png" />
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .confirm-shell{min-height:72vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px 6%}
    .confirm-shell h1{font-family:var(--serif);font-weight:400;color:var(--ink);font-size:clamp(2.2rem,5.5vw,3.6rem);line-height:1.1}
    .confirm-shell .sub{margin:20px auto 0;max-width:44ch}
    .confirm-shell .btn{margin-top:32px}
    .confirm-smile{width:min(38vw,150px);height:auto;margin:34px auto 0;display:block}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="wrap">
      <a href="/" aria-label="MJØÅR"><img class="brand" src="/assets/logo.png" alt="MJØÅR" /></a>
      <div class="nav-right">
        <div class="langtoggle" role="group" aria-label="Language">
          <button type="button" data-lang="de">DE</button>
          <span aria-hidden="true">·</span>
          <button type="button" data-lang="en">EN</button>
        </div>
      </div>
    </div>
  </header>

  <main class="confirm-shell">
    <div>
      <p class="eyebrow" data-i18n="c.eyebrow">Early access</p>
      <h1 style="margin-top:14px" data-i18n="c.h1">You're in.</h1>
      <p class="sub" data-i18n="c.sub">Your signup is confirmed. You will be the first to hear when the first finishes arrive this autumn.</p>
      <img class="confirm-smile" src="/assets/smile.png" alt="" />
      <a class="btn" href="/latte-art/" data-i18n="c.btn">Learn latte art while you wait</a>
    </div>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <a href="/" aria-label="MJØÅR"><img class="brand" src="/assets/logo.png" alt="MJØÅR" /></a>
      <span class="copyline">© <span id="year"></span> MJØÅR</span>
    </div>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    const T = {
      en: { 'c.eyebrow':'Early access','c.h1':"You're in.",'c.sub':'Your signup is confirmed. You will be the first to hear when the first finishes arrive this autumn.','c.btn':'Learn latte art while you wait' },
      de: { 'c.eyebrow':'Früher Zugang','c.h1':'Du bist dabei.','c.sub':'Deine Anmeldung ist bestätigt. Du erfährst als Erstes, wenn die ersten Farben diesen Herbst kommen.','c.btn':'Bis dahin: Latte Art lernen' }
    };
    const applyLang = (lang) => {
      const cur = (lang === 'de') ? 'de' : 'en';
      document.documentElement.lang = cur;
      document.querySelectorAll('[data-i18n]').forEach((el) => { const k = el.getAttribute('data-i18n'); if (T[cur][k] !== undefined) el.textContent = T[cur][k]; });
      document.querySelectorAll('.langtoggle button').forEach((b) => b.setAttribute('aria-pressed', b.dataset.lang === cur ? 'true' : 'false'));
      try { localStorage.setItem('mjoar_lang', cur); } catch (e) {}
    };
    document.querySelectorAll('.langtoggle button').forEach((b) => b.addEventListener('click', () => applyLang(b.dataset.lang)));
    let initial = 'en';
    try { initial = localStorage.getItem('mjoar_lang') || (navigator.language && navigator.language.toLowerCase().startsWith('de') ? 'de' : 'en'); } catch (e) {}
    applyLang(initial);
  </script>
</body>
</html>
