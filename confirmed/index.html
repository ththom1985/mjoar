<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>You're in · MJØÅR</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="/assets/favicon-32.png" sizes="32x32" type="image/png" />
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    body{background:var(--band)}
    .topbar{background:rgba(246,248,245,.8)}
    .confirm-shell{min-height:78vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:48px 6%}
    .rise{opacity:0;transform:translateY(22px);animation:rise 1s var(--ease) forwards}
    .rise.d1{animation-delay:.12s}.rise.d2{animation-delay:.24s}.rise.d3{animation-delay:.36s}
    @keyframes rise{to{opacity:1;transform:none}}
    .heart-shot{width:min(52vw,190px);height:min(52vw,190px);margin:0 auto 32px;border-radius:50%;overflow:hidden;box-shadow:0 10px 34px rgba(63,72,66,.16)}
    .heart-shot img{width:100%;height:100%;object-fit:cover;display:block}
    .confirm-shell h1{font-family:var(--serif);font-weight:400;color:var(--ink);font-size:clamp(2.4rem,6vw,4rem);line-height:1.08}
    .confirm-shell .sub{margin:22px auto 0;max-width:42ch;font-size:1.1rem}
    .confirm-shell .btn{margin-top:34px}
    .confirm-smile{height:22px;width:auto;margin:40px auto 0;display:block;opacity:.55}
    .site-footer{background:var(--band)}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="wrap">
      <a href="/" aria-label="MJØÅR"><img class="brand" src="/assets/logo.png" alt="MJØÅR" /></a>
      <div class="nav-right">
        <div class="langtoggle" role="group" aria-label="Language">
          <button type="button" data-lang="de">DE</button>
          <span aria-hidden="true">·</span>
          <button type="button" data-lang="en">EN</button>
        </div>
      </div>
    </div>
  </header>

  <main class="confirm-shell">
    <div>
      <div class="heart-shot rise" aria-hidden="true"><img src="/assets/latte/heart.jpg" alt="" /></div>
      <p class="eyebrow rise d1" data-i18n="c.eyebrow">Early access</p>
      <h1 class="rise d1" style="margin-top:14px" data-i18n="c.h1">You're in.</h1>
      <p class="sub rise d2" data-i18n="c.sub">Your signup is confirmed. You will be the first to hear when the first finishes arrive this autumn.</p>
      <a class="btn rise d2" href="/latte-art/" data-i18n="c.btn">Learn latte art while you wait</a>
      <img class="confirm-smile rise d3" src="/assets/smile.png" alt="" />
    </div>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <a href="/" aria-label="MJØÅR"><img class="brand" src="/assets/logo.png" alt="MJØÅR" /></a>
      <span class="copyline">© <span id="year"></span> MJØÅR</span>
    </div>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    const T = {
      en: { 'c.eyebrow':'Early access','c.h1':"You're in.",'c.sub':'Your signup is confirmed. You will be the first to hear when the first finishes arrive this autumn.','c.btn':'Learn latte art while you wait' },
      de: { 'c.eyebrow':'Früher Zugang','c.h1':'Du bist dabei.','c.sub':'Deine Anmeldung ist bestätigt. Du erfährst als Erstes, wenn die ersten Farben diesen Herbst kommen.','c.btn':'Bis dahin: Latte Art lernen' }
    };
    const applyLang = (lang) => {
      const cur = (lang === 'de') ? 'de' : 'en';
      document.documentElement.lang = cur;
      document.querySelectorAll('[data-i18n]').forEach((el) => { const k = el.getAttribute('data-i18n'); if (T[cur][k] !== undefined) el.textContent = T[cur][k]; });
      document.querySelectorAll('.langtoggle button').forEach((b) => b.setAttribute('aria-pressed', b.dataset.lang === cur ? 'true' : 'false'));
      try { localStorage.setItem('mjoar_lang', cur); } catch (e) {}
    };
    document.querySelectorAll('.langtoggle button').forEach((b) => b.addEventListener('click', () => applyLang(b.dataset.lang)));
    let initial = 'en';
    try { initial = localStorage.getItem('mjoar_lang') || (navigator.language && navigator.language.toLowerCase().startsWith('de') ? 'de' : 'en'); } catch (e) {}
    applyLang(initial);
  </script>
</body>
</html>
