<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Almost there · MJØÅR</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="/assets/favicon-32.png" sizes="32x32" type="image/png" />
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    body{background:var(--band)}
    .topbar{background:rgba(246,248,245,.8)}
    .confirm-shell{min-height:78vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:48px 6%}
    .rise{opacity:0;transform:translateY(22px);animation:rise 1s var(--ease) forwards}
    .rise.d1{animation-delay:.12s}.rise.d2{animation-delay:.24s}.rise.d3{animation-delay:.36s}
    @keyframes rise{to{opacity:1;transform:none}}
    .mail-mark{width:74px;height:74px;margin:0 auto 30px;color:var(--ink)}
    .mail-mark svg{width:100%;height:100%;display:block}
    .confirm-shell h1{font-family:var(--serif);font-weight:400;color:var(--ink);font-size:clamp(2.4rem,6vw,4rem);line-height:1.08}
    .confirm-shell .sub{margin:22px auto 0;max-width:42ch;font-size:1.1rem}
    .steps-mini{display:flex;gap:clamp(20px,5vw,54px);justify-content:center;margin:38px auto 0;flex-wrap:wrap}
    .step-mini{max-width:200px}
    .step-mini .n{font-family:var(--serif);font-size:1.05rem;color:var(--ink);width:30px;height:30px;border:1px solid var(--line-strong);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;background:#fff}
    .step-mini p{color:var(--muted);font-size:.92rem;line-height:1.5}
    .hint{margin:36px auto 0;font-size:.84rem;color:var(--soft);max-width:44ch}
    .site-footer{background:var(--band)}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="wrap">
      <a href="/" aria-label="MJØÅR"><img class="brand" src="/assets/logo.png" alt="MJØÅR" /></a>
      <div class="nav-right">
        <div class="langtoggle" role="group" aria-label="Language">
          <button type="button" data-lang="de">DE</button>
          <span aria-hidden="true">·</span>
          <button type="button" data-lang="en">EN</button>
        </div>
      </div>
    </div>
  </header>

  <main class="confirm-shell">
    <div>
      <div class="mail-mark rise" aria-hidden="true">
        <svg viewBox="0 0 74 74" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="10" y="20" width="54" height="38" rx="6"/>
          <path d="M12 24 L37 44 L62 24"/>
          <path d="M37 8 C39.5 11 39.5 14 37 17" stroke-opacity=".45"/>
          <path d="M30 10 C32 12.4 32 14.6 30 17" stroke-opacity=".3"/>
          <path d="M44 10 C46 12.4 46 14.6 44 17" stroke-opacity=".3"/>
        </svg>
      </div>
      <p class="eyebrow rise d1" data-i18n="a.eyebrow">One more step</p>
      <h1 class="rise d1" style="margin-top:14px" data-i18n="a.h1">Almost there.</h1>
      <p class="sub rise d2" data-i18n="a.sub">We just sent you an email from info@mjoar.com.</p>
      <div class="steps-mini rise d2">
        <div class="step-mini"><div class="n">1</div><p data-i18n="a.s1">Open the email in your inbox</p></div>
        <div class="step-mini"><div class="n">2</div><p data-i18n="a.s2">Click the confirmation link</p></div>
        <div class="step-mini"><div class="n">3</div><p data-i18n="a.s3">You're on the list</p></div>
      </div>
      <p class="hint rise d3" data-i18n="a.hint">Nothing arrived? Check your spam folder, it happens to the best of us.</p>
    </div>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <a href="/" aria-label="MJØÅR"><img class="brand" src="/assets/logo.png" alt="MJØÅR" /></a>
      <span class="copyline">© <span id="year"></span> MJØÅR</span>
    </div>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    const T = {
      en: { 'a.eyebrow':'One more step','a.h1':'Almost there.','a.sub':'We just sent you an email from info@mjoar.com.','a.s1':'Open the email in your inbox','a.s2':'Click the confirmation link','a.s3':"You're on the list",'a.hint':'Nothing arrived? Check your spam folder, it happens to the best of us.' },
      de: { 'a.eyebrow':'Noch ein Schritt','a.h1':'Fast geschafft.','a.sub':'Wir haben dir gerade eine E-Mail von info@mjoar.com geschickt.','a.s1':'Öffne die E-Mail in deinem Postfach','a.s2':'Klick auf den Bestätigungslink','a.s3':'Du bist auf der Liste','a.hint':'Nichts angekommen? Schau in den Spam-Ordner, passiert den Besten.' }
    };
    const applyLang = (lang) => {
      const cur = (lang === 'de') ? 'de' : 'en';
      document.documentElement.lang = cur;
      document.querySelectorAll('[data-i18n]').forEach((el) => { const k = el.getAttribute('data-i18n'); if (T[cur][k] !== undefined) el.textContent = T[cur][k]; });
      document.querySelectorAll('.langtoggle button').forEach((b) => b.setAttribute('aria-pressed', b.dataset.lang === cur ? 'true' : 'false'));
      try { localStorage.setItem('mjoar_lang', cur); } catch (e) {}
    };
    document.querySelectorAll('.langtoggle button').forEach((b) => b.addEventListener('click', () => applyLang(b.dataset.lang)));
    let initial = 'en';
    try { initial = localStorage.getItem('mjoar_lang') || (navigator.language && navigator.language.toLowerCase().startsWith('de') ? 'de' : 'en'); } catch (e) {}
    applyLang(initial);
  </script>
</body>
</html>
