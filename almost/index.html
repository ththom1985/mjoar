<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Almost there · MJØÅR</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="/assets/favicon-32.png" sizes="32x32" type="image/png" />
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .confirm-shell{min-height:72vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px 6%}
    .confirm-shell h1{font-family:var(--serif);font-weight:400;color:var(--ink);font-size:clamp(2.2rem,5.5vw,3.6rem);line-height:1.1}
    .confirm-shell .sub{margin:20px auto 0;max-width:44ch}
    .confirm-shell .hint{margin:14px auto 0;font-size:.85rem;color:var(--soft);max-width:44ch}
    .confirm-shell .btn{margin-top:32px}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="wrap">
      <a href="/" aria-label="MJØÅR"><img class="brand" src="/assets/logo.png" alt="MJØÅR" /></a>
      <div class="nav-right">
        <div class="langtoggle" role="group" aria-label="Language">
          <button type="button" data-lang="de">DE</button>
          <span aria-hidden="true">·</span>
          <button type="button" data-lang="en">EN</button>
        </div>
      </div>
    </div>
  </header>

  <main class="confirm-shell">
    <div>
      <p class="eyebrow" data-i18n="a.eyebrow">One more step</p>
      <h1 style="margin-top:14px" data-i18n="a.h1">Almost there.</h1>
      <p class="sub" data-i18n="a.sub">We just sent you an email. Click the link inside to confirm your signup, then you are on the list.</p>
      <p class="hint" data-i18n="a.hint">Nothing arrived? Check your spam folder, it happens to the best of us.</p>
      <a class="btn" href="/" data-i18n="a.btn">Back to the site</a>
    </div>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <a href="/" aria-label="MJØÅR"><img class="brand" src="/assets/logo.png" alt="MJØÅR" /></a>
      <span class="copyline">© <span id="year"></span> MJØÅR</span>
    </div>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    const T = {
      en: { 'a.eyebrow':'One more step','a.h1':'Almost there.','a.sub':'We just sent you an email. Click the link inside to confirm your signup, then you are on the list.','a.hint':'Nothing arrived? Check your spam folder, it happens to the best of us.','a.btn':'Back to the site' },
      de: { 'a.eyebrow':'Noch ein Schritt','a.h1':'Fast geschafft.','a.sub':'Wir haben dir gerade eine E-Mail geschickt. Klick auf den Link darin, um deine Anmeldung zu bestätigen, dann bist du auf der Liste.','a.hint':'Nichts angekommen? Schau in den Spam-Ordner, passiert den Besten.','a.btn':'Zurück zur Seite' }
    };
    const applyLang = (lang) => {
      const cur = (lang === 'de') ? 'de' : 'en';
      document.documentElement.lang = cur;
      document.querySelectorAll('[data-i18n]').forEach((el) => { const k = el.getAttribute('data-i18n'); if (T[cur][k] !== undefined) el.textContent = T[cur][k]; });
      document.querySelectorAll('.langtoggle button').forEach((b) => b.setAttribute('aria-pressed', b.dataset.lang === cur ? 'true' : 'false'));
      try { localStorage.setItem('mjoar_lang', cur); } catch (e) {}
    };
    document.querySelectorAll('.langtoggle button').forEach((b) => b.addEventListener('click', () => applyLang(b.dataset.lang)));
    let initial = 'en';
    try { initial = localStorage.getItem('mjoar_lang') || (navigator.language && navigator.language.toLowerCase().startsWith('de') ? 'de' : 'en'); } catch (e) {}
    applyLang(initial);
  </script>
</body>
</html>
